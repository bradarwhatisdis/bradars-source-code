name: Build library.so

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"

      - name: Build native library
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/24.0.8215888
          export PATH=${ANDROID_NDK_HOME}:${PATH}
          ./gradlew :app:buildOnlyLibrary --no-daemon

      - name: Upload library.so
        uses: actions/upload-artifact@v4
        with:
          name: library-arm64-v8a
          path: app/src/main/libs/arm64-v8a/library.so
          if-no-files-found: error
